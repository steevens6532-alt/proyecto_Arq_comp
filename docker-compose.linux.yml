# ============================================
# docker-compose.linux.yml - PetFeeder Bridge (Linux/Arch)
# ============================================
# Esta versión SÍ funciona con el Arduino conectado, porque en
# Linux Docker puede acceder directamente a los dispositivos /dev.
#
# Antes de correr, verifica tu puerto con: ls /dev/tty*
# Si no es /dev/ttyACM0, cámbialo abajo en "devices".
#
# Para correr:  docker compose -f docker-compose.linux.yml up --build

services:
  bridge:
    build: .
    container_name: petfeeder-bridge
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"   # cambia si tu puerto es distinto
    ports:
      - "8765:8765"
    restart: unless-stopped
